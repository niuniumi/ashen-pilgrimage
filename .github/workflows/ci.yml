name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm run qa:content-schema
      - run: pnpm run qa:asset-manifest
      - run: pnpm run qa:visual-bindings
      - run: pnpm build
      - name: Install Chromium for browser regression
        run: pnpm exec playwright install --with-deps chromium
      - name: Verify legacy map migration in browser
        run: |
          pnpm exec vite preview --host 127.0.0.1 --port 4173 &
          preview_pid=$!
          trap 'kill $preview_pid' EXIT
          ready=0
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              ready=1
              break
            fi
            sleep 1
          done
          test "$ready" -eq 1
          pnpm run qa:map-migration
          pnpm run qa:progression
          pnpm run qa:resume-stages
