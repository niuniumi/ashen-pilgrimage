name: Deploy GitHub Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: github-pages
  queue: max

jobs:
  build:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Reject stale CI head
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CI_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          latest_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq '.sha')"
          test "$CI_HEAD_SHA" = "$latest_main_sha" || {
            echo "Refusing stale deployment: CI=$CI_HEAD_SHA main=$latest_main_sha" >&2
            exit 1
          }
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-python@v6
        with:
          python-version: 3.13
      - run: python -m pip install Pillow==12.2.0
      - uses: actions/configure-pages@v5
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm run qa:content-schema
      - run: pnpm run qa:asset-manifest
      - run: pnpm run qa:visual-bindings
      - run: pnpm exec vite build --base=/ashen-pilgrimage/
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Reject stale CI head
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CI_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          latest_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq '.sha')"
          test "$CI_HEAD_SHA" = "$latest_main_sha" || {
            echo "Refusing stale deployment: CI=$CI_HEAD_SHA main=$latest_main_sha" >&2
            exit 1
          }
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Chromium for deployed-site smoke test
        run: pnpm exec playwright install --with-deps chromium
      - name: Verify deployed site
        env:
          DEPLOY_URL: ${{ steps.deployment.outputs.page_url }}
        run: pnpm run qa:deploy-smoke
