<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灰烬圣途 Ashen Pilgrimage</title>
    <link rel="preload" href="/assets/fonts/fusion-pixel-10px-zh-hans.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      @font-face {
        font-family: "PixelCN";
        src: url("/assets/fonts/fusion-pixel-10px-zh-hans.woff2") format("woff2");
        font-display: swap;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #08090d;
      }

      #game {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #08090d;
      }

      canvas {
        position: relative;
        z-index: 2;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      #boot-splash {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: grid;
        place-content: center;
        gap: 12px;
        color: #f2c86d;
        text-align: center;
        font-family: PixelCN, "Microsoft YaHei", monospace;
      }

      #boot-splash strong {
        font-size: 42px;
        font-weight: 400;
      }

      #boot-splash span {
        color: #c7a96f;
        font-size: 16px;
      }

      canvas:focus-visible {
        outline: 3px solid #f2c86d;
        outline-offset: -4px;
      }

      @media (prefers-reduced-motion: reduce) {
        #game {
          background: #08090d;
        }
      }
    </style>
  </head>
  <body>
    <main id="game" aria-label="灰烬圣途">
      <div id="boot-splash" aria-live="polite">
        <strong>灰烬圣途</strong>
        <span>正在唤醒余烬</span>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
