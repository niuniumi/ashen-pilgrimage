<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灰烬圣途 Ashen Pilgrimage</title>
    <style>
      @font-face {
        font-family: "PixelCN";
        src: url("/assets/fonts/fusion-pixel-10px-zh-hans.woff2") format("woff2");
        font-display: swap;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #08090d;
      }

      #game {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #11131a;
        background-image:
          linear-gradient(45deg, #1b1d24 25%, transparent 25%),
          linear-gradient(-45deg, #1b1d24 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #1b1d24 75%),
          linear-gradient(-45deg, transparent 75%, #1b1d24 75%);
        background-size: 16px 16px;
        background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      }

      canvas {
        position: relative;
        z-index: 2;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      #boot-splash {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: grid;
        place-content: center;
        gap: 12px;
        color: #f2c86d;
        text-align: center;
        font-family: PixelCN, "Microsoft YaHei", monospace;
      }

      #boot-splash strong {
        font-size: 42px;
        font-weight: 400;
      }

      #boot-splash span {
        color: #c7a96f;
        font-size: 16px;
      }

      canvas:focus-visible {
        outline: 3px solid #f2c86d;
        outline-offset: -4px;
      }

      @media (prefers-reduced-motion: reduce) {
        #game {
          background: #15100d;
        }
      }
    </style>
  </head>
  <body>
    <main id="game" aria-label="灰烬圣途">
      <div id="boot-splash" aria-live="polite">
        <strong>灰烬圣途</strong>
        <span>正在唤醒余烬</span>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
